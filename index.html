<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Al-Quran Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --ar-size: 2.8rem; --emerald-primary: #065f46; --emerald-light: #ecfdf5; }
    body { font-family: 'Inter', sans-serif; background: #fafafa; color: #1e293b; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    
    /* Tipografi Arab */
    .font-quran { font-family: 'Amiri', serif; line-height: 2.8; direction: rtl; font-size: var(--ar-size); }
    .font-surah-ar { font-family: 'Amiri', serif; font-size: 2rem; color: var(--emerald-primary); font-weight: 700; }
    
    /* Ornamen Rub el Hizb (Nomor Ayat) */
    .quran-no {
      display: inline-flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; background: var(--emerald-primary); color: white;
      font-weight: bold; font-size: 14px; position: relative;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    /* UI & Navigasi */
    .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; }
    .sidebar-active { background: var(--emerald-light) !important; border-right: 4px solid var(--emerald-primary); color: var(--emerald-primary) !important; font-weight: 700; }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; }
    @media (min-width: 1024px) { .card-hover:hover { transform: translateY(-4px); border-color: var(--emerald-primary); box-shadow: 0 20px 25px -5px rgba(6, 95, 70, 0.1); } }
    
    /* Custom Scrollbar */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Bismillah Container */
    .bismillah-box {
      font-family: 'Amiri', serif; text-align: center; font-size: 2.5rem; color: var(--emerald-primary);
      background: var(--emerald-light); padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #d1fae5; margin-bottom: 2rem;
    }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f1f5f9; z-index: 40; display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.5rem; }

    @media (min-width: 1024px) { 
      .main-content { margin-left: 20rem; } 
      .sidebar-fixed { transform: translateX(0) !important; } 
      .bottom-nav { left: 20rem; }
    }
  </style>
</head>
<body>

  <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-white z-[60] border-r border-slate-100 flex flex-col -translate-x-full sidebar-fixed transition-transform duration-300">
    <div class="p-8 border-b border-slate-50">
      <div class="flex items-center gap-3 mb-8">
        <div class="bg-emerald-900 text-white p-2.5 rounded-2xl shadow-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        </div>
        <div>
          <h1 class="font-bold text-emerald-950 text-xl tracking-tight leading-none">Al-Quran Digital</h1>
          <p class="text-[9px] text-emerald-600 font-bold tracking-[0.2em] uppercase mt-1">Terjemah dan Tafsir</p>
        </div>
      </div>
      
      <button onclick="showHome()" class="w-full flex items-center gap-3 p-3.5 mb-6 bg-emerald-50 text-emerald-800 rounded-2xl font-bold text-sm hover:bg-emerald-100 transition-all">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        Beranda Utama
      </button>

      <div class="relative">
        <input type="text" id="searchInput" onkeyup="filterSurah()" placeholder="Cari nama atau nomor..." class="w-full p-3.5 pl-11 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500/20 text-sm transition-all">
        <svg class="w-4 h-4 absolute left-4 top-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"></path></svg>
      </div>
    </div>
    <nav id="sidebarList" class="overflow-y-auto flex-1 p-4 space-y-1 hide-scrollbar"></nav>
  </aside>

  <div id="overlay" onclick="toggleSidebar(true)" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[55] lg:hidden hidden transition-opacity"></div>

  <header class="glass-nav sticky top-0 z-50 p-4 main-content transition-all">
    <div class="max-w-5xl mx-auto flex justify-between items-center px-2">
      <button onclick="toggleSidebar()" class="lg:hidden p-2.5 text-slate-600 bg-white border border-slate-100 shadow-sm rounded-xl">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"></path></svg>
      </button>
      
      <div id="navControls" class="flex items-center gap-1 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
        <button onclick="navSurah(-1)" class="p-2 w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl transition text-emerald-800 font-bold">←</button>
        <span id="headerTitle" class="text-[10px] font-extrabold text-slate-700 uppercase tracking-[0.2em] px-5 min-w-[130px] text-center">Surah</span>
        <button onclick="navSurah(1)" class="p-2 w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl transition text-emerald-800 font-bold">→</button>
      </div>

      <div class="flex items-center bg-emerald-50 rounded-full p-1 border border-emerald-100">
        <button onclick="adjustFont(-0.2)" class="w-9 h-9 flex items-center justify-center hover:bg-white rounded-full text-xs font-bold text-emerald-900 transition">A-</button>
        <button onclick="adjustFont(0.2)" class="w-9 h-9 flex items-center justify-center hover:bg-white rounded-full text-xs font-bold text-emerald-900 transition">A+</button>
      </div>
    </div>
  </header>

  <main class="main-content p-5 md:p-12 transition-all min-h-screen">
    
    <div id="homeView" class="max-w-5xl mx-auto">
      <div class="mb-12">
        <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">Kalamullah</h2>
        <p class="text-slate-400 mt-2 font-medium italic">"Maka bacalah apa yang mudah bagimu dari Al-Qur'an"</p>
      </div>
      <div id="loader" class="flex flex-col items-center py-20 animate-pulse text-emerald-900 font-bold uppercase text-[10px] tracking-widest">
         Mempersiapkan Lembaran Suci...
      </div>
      <div id="surahGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
    </div>

    <div id="readingView" class="hidden max-w-4xl mx-auto pb-40">
      <div class="text-center mb-16 space-y-8 bg-white p-10 md:p-16 rounded-[3rem] border border-slate-50 shadow-sm relative overflow-hidden">
        <div id="surahMeta" class="text-[10px] font-bold text-emerald-700 uppercase tracking-[0.4em] bg-emerald-50 px-5 py-1.5 inline-block rounded-full border border-emerald-100 relative z-10"></div>
        <h2 id="activeTitle" class="text-6xl md:text-7xl font-bold text-emerald-950 tracking-tighter relative z-10"></h2>
        <div class="flex justify-center relative z-10">
          <audio id="mainAudio" controls class="h-11 w-full max-w-xs shadow-xl rounded-full"></audio>
        </div>
      </div>
      <div id="ayatList" class="space-y-10"></div>
    </div>
  </main>

  <div id="bottomNav" class="bottom-nav hidden">
    <button onclick="navSurah(-1)" class="flex items-center gap-2 text-emerald-900 font-bold text-[10px] uppercase tracking-widest bg-emerald-50 px-5 py-3 rounded-2xl active:bg-emerald-200 transition-all border border-emerald-100">
      ← Prev
    </button>
    <button onclick="showHome()" class="p-3 bg-slate-50 rounded-2xl text-slate-400">
       <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
    </button>
    <button onclick="navSurah(1)" class="flex items-center gap-2 text-emerald-900 font-bold text-[10px] uppercase tracking-widest bg-emerald-50 px-5 py-3 rounded-2xl active:bg-emerald-200 transition-all border border-emerald-100">
      Next →
    </button>
  </div>

  <script>
    // URL Deployment Apps Script Anda
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyO5iRRs8v8s5KN_Q1y-7iPQgibRWF50CUvzLYIrp_zr23p1IOzU8JY17oBBZkJHus1/exec";
    
    let allSurahs = [];
    let currentSurahId = null;
    let currentFontSize = 2.8;

    window.onload = () => init();

    async function init() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getSurahList`);
        allSurahs = await res.json();
        if(document.getElementById('loader')) document.getElementById('loader').remove();
        renderGrid(allSurahs);
        renderSidebar(allSurahs);
      } catch(e) { 
          console.error(e);
          document.getElementById('loader').innerHTML = "<span class='text-red-500'>Gagal memuat data. Periksa koneksi atau URL script.</span>";
      }
    }

    function toggleSidebar(close = false) {
      const sb = document.getElementById('sidebar'), ov = document.getElementById('overlay');
      if(close) { sb.classList.add('-translate-x-full'); ov.classList.add('hidden'); }
      else { sb.classList.toggle('-translate-x-full'); ov.classList.toggle('hidden'); }
    }

    function renderGrid(data) {
      document.getElementById('surahGrid').innerHTML = data.map(s => `
        <div onclick="openSurah(${s.id}, '${s.name.replace(/'/g, "\\'")}')" class="card-hover bg-white p-7 rounded-[2.5rem] cursor-pointer flex justify-between items-center shadow-sm">
          <div class="flex items-center gap-5">
            <div class="w-11 h-11 bg-emerald-900 text-white flex items-center justify-center rounded-2xl font-bold text-xs rotate-45 shadow-lg shadow-emerald-900/10"><span class="-rotate-45">${s.id}</span></div>
            <div>
              <h4 class="font-bold text-xl text-slate-800 tracking-tight leading-tight">${s.name}</h4>
              <p class="text-[9px] text-slate-400 font-extrabold uppercase tracking-widest mt-1.5">${s.type} • ${s.count} AYAT</p>
            </div>
          </div>
          <div class="font-surah-ar opacity-20 text-3xl tracking-tight">${s.nameAr}</div>
        </div>`).join('');
    }

    function renderSidebar(data) {
      document.getElementById('sidebarList').innerHTML = data.map(s => `
        <div onclick="openSurah(${s.id}, '${s.name.replace(/'/g, "\\'")}')" id="side-${s.id}" class="p-4 px-6 rounded-2xl cursor-pointer text-sm hover:bg-emerald-50 text-slate-500 transition-all flex justify-between items-center group">
          <span class="font-semibold group-hover:text-emerald-900">${s.id}. ${s.name}</span>
          <span class="font-quran text-lg opacity-20">${s.nameAr}</span>
        </div>`).join('');
    }

    async function openSurah(id, name) {
      currentSurahId = id;
      toggleSidebar(true);

      document.getElementById('homeView').classList.add('hidden');
      document.getElementById('readingView').classList.remove('hidden');
      document.getElementById('bottomNav').classList.remove('hidden');
      document.getElementById('activeTitle').innerText = name;
      document.getElementById('headerTitle').innerText = name;
      
      const s = allSurahs.find(x => x.id == id);
      document.getElementById('surahMeta').innerText = `${s.type} • ${s.count} Ayat`;
      document.getElementById('mainAudio').src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${id}.mp3`;

      document.querySelectorAll('#sidebarList div').forEach(el => el.classList.remove('sidebar-active'));
      const activeSide = document.getElementById(`side-${id}`);
      if(activeSide) {
          activeSide.classList.add('sidebar-active');
          activeSide.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      document.getElementById('ayatList').innerHTML = `<div class="text-center py-24 text-emerald-900 font-bold animate-pulse text-[10px] tracking-[0.5em] uppercase">Menampilkan Ayat Suci...</div>`;
      window.scrollTo({top: 0, behavior: 'smooth'});

      try {
          const res = await fetch(`${SCRIPT_URL}?action=getAyatData&surahId=${id}`);
          const ayats = await res.json();
          
          document.getElementById('ayatList').innerHTML = ayats.map(a => {
            let arab = a.arab, bism = "";
            const BISM_TEXT = "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ";
            if (a.no == 1 && id != 1 && id != 9 && arab.includes(BISM_TEXT)) {
              arab = arab.replace(BISM_TEXT, "").trim();
              bism = `<div class="bismillah-box">${BISM_TEXT}</div>`;
            }
            return `
              <div class="bg-white p-8 md:p-14 rounded-[3rem] border border-slate-50 shadow-sm space-y-10 group transition-all hover:border-emerald-100">
                ${bism}
                <div class="flex justify-between items-center">
                  <div class="quran-no">${a.no}</div>
                  <div class="flex gap-2">
                      <button onclick="copyAyat('${a.arab.replace(/'/g, "\\'")}', '${a.indo.replace(/'/g, "\\'")}', ${id}, ${a.no})" class="p-3 text-slate-300 hover:text-emerald-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" stroke-width="2"></path></svg>
                      </button>
                      <button onclick="new Audio('${a.audio}').play()" class="bg-emerald-50 p-3 rounded-full text-emerald-700 shadow-inner hover:bg-emerald-100 transition-all">🔊</button>
                  </div>
                </div>
                <div class="font-quran text-right text-slate-800 tracking-wide">${arab}</div>
                <div class="space-y-6">
                  <p class="text-slate-600 text-xl leading-relaxed font-light italic bg-slate-50/50 p-7 rounded-[2rem] border border-slate-50 shadow-inner">${a.indo}</p>
                  <details class="bg-emerald-50/30 rounded-[1.5rem] border border-emerald-50 overflow-hidden">
                    <summary class="list-none p-5 text-[10px] font-bold text-emerald-900 uppercase tracking-widest cursor-pointer flex justify-between items-center">Tafsir Jalalain <span>▼</span></summary>
                    <p class="p-6 pt-0 text-sm text-emerald-950 leading-relaxed border-t border-emerald-100 italic font-medium">${a.tafsir}</p>
                  </details>
                </div>
              </div>`;
          }).join('');
      } catch (e) {
          document.getElementById('ayatList').innerHTML = "<p class='text-center text-red-500'>Gagal mengambil data ayat.</p>";
      }
    }

    function navSurah(step) {
      const nextId = currentSurahId + step;
      if (nextId >= 1 && nextId <= 114) {
        const s = allSurahs.find(x => x.id == nextId);
        openSurah(nextId, s.name);
      }
    }

    function showHome() {
      toggleSidebar(true);
      document.getElementById('homeView').classList.remove('hidden');
      document.getElementById('readingView').classList.add('hidden');
      document.getElementById('bottomNav').classList.add('hidden');
      document.getElementById('headerTitle').innerText = "Mushaf Pro";
      document.getElementById('mainAudio').pause();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function adjustFont(d) {
      currentFontSize = Math.min(Math.max(currentFontSize + d, 1.8), 5.5);
      document.documentElement.style.setProperty('--ar-size', `${currentFontSize}rem`);
    }

    function filterSurah() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderGrid(allSurahs.filter(s => s.name.toLowerCase().includes(q) || s.id.toString().includes(q)));
    }

    function copyAyat(ar, id, s, a) {
      const text = `${ar}\n\n"${id}"\n\n(QS. ${s}:${a})`;
      navigator.clipboard.writeText(text).then(() => {
          alert("Ayat dan Terjemah berhasil disalin!");
      });
    }
  </script>
  <link rel="manifest" href="manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker terdaftar!', reg))
        .catch(err => console.log('Gagal daftar SW:', err));
    });
  }
</script>
  
</body>
</html>
