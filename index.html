<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Al-Quran Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --arabic-size: 2.8rem; }
    body { font-family: 'Inter', sans-serif; background: #fafafa; overflow-x: hidden; }
    .font-quran { font-family: 'Amiri', serif; line-height: 2.8; direction: rtl; font-size: var(--arabic-size); }
    .font-bismillah { font-family: 'Amiri', serif; font-size: 3.5rem; color: #064e3b; }
    
    /* Ornamen Angka Al-Quran */
    .quran-no {
      display: inline-flex; align-items: center; justify-content: center;
      width: 45px; height: 45px; background: #10b981; color: white;
      font-weight: bold; font-size: 14px; position: relative;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }
    .surah-no {
      width: 50px; height: 50px; background: #064e3b;
      display: flex; align-items: center; justify-content: center;
      color: white; border-radius: 12px; transform: rotate(45deg);
    }
    .surah-no span { transform: rotate(-45deg); font-weight: 800; }

    .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #f1f5f9; }
    .sidebar-active { background: #f0fdf4 !important; border-right: 4px solid #059669; color: #065f46 !important; }
    @media (min-width: 1024px) { .main-content { margin-left: 20rem; } .sidebar-fixed { transform: translateX(0) !important; } }
  </style>
</head>
<body class="text-slate-900">

  <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-white z-[60] border-r border-slate-100 flex flex-col -translate-x-full sidebar-fixed transition-transform duration-300">
    <div class="p-8 border-b border-slate-50">
      <div onclick="showHome()" class="flex items-center gap-3 mb-6 cursor-pointer">
        <div class="bg-emerald-800 text-white p-2 rounded-xl"><b>AR</b></div>
        <h1 class="font-bold text-emerald-900 text-xl">Al-Quran Digital</h1>
      </div>
      <input type="text" id="searchInput" onkeyup="filterSurah()" placeholder="Cari Surah..." class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none text-sm">
    </div>
    <nav id="sidebarList" class="overflow-y-auto flex-1 p-4 space-y-1 bg-white"></nav>
  </aside>

  <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/20 z-[55] lg:hidden hidden"></div>

  <header class="glass-nav sticky top-0 z-50 p-4 main-content">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-500">☰</button>
      <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
        <button onclick="navSurah(-1)" class="p-2 text-emerald-700 font-bold"><</button>
        <span id="headerTitle" class="text-[11px] font-extrabold uppercase tracking-widest px-4 min-w-[120px] text-center">Indeks Surah</span>
        <button onclick="navSurah(1)" class="p-2 text-emerald-700 font-bold">></button>
      </div>
      <div class="flex items-center bg-emerald-50 rounded-full p-1 border border-emerald-100">
        <button onclick="adjustFont(-0.2)" class="w-8 h-8 font-bold text-emerald-800">A-</button>
        <button onclick="adjustFont(0.2)" class="w-8 h-8 font-bold text-emerald-800">A+</button>
      </div>
    </div>
  </header>

  <main class="main-content p-6 md:p-12 transition-all">
    <div id="homeView" class="max-w-4xl mx-auto">
      <div id="loader" class="text-center py-20 animate-pulse text-emerald-800 font-bold">Menyiapkan Mushaf...</div>
      <div id="surahGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <div id="readingView" class="hidden max-w-5xl mx-auto">
      <div class="text-center mb-16 space-y-6">
        <div id="surahMeta" class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest"></div>
        <h2 id="activeTitle" class="text-6xl font-bold text-emerald-900 italic"></h2>
        <div class="flex justify-center"><audio id="mainAudio" controls class="h-10 w-64 md:w-96"></audio></div>
        <div id="bismillahArea" class="py-12 flex justify-center"><div class="font-bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div></div>
      </div>
      <div id="ayatList" class="space-y-20 pb-40"></div>
    </div>
  </main>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyO5iRRs8v8s5KN_Q1y-7iPQgibRWF50CUvzLYIrp_zr23p1IOzU8JY17oBBZkJHus1/exec";
    let allSurahs = [], currentSurahId = null, surahMetaMap = {};

    window.onload = () => initApp();

    async function initApp() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getSurahList`);
        allSurahs = await response.json();
        document.getElementById('loader').classList.add('hidden');
        renderGrid(allSurahs);
        renderSidebar(allSurahs);
      } catch(e) { console.error(e); }
    }

    function renderGrid(data) {
      document.getElementById('surahGrid').innerHTML = data.map(s => `
        <div onclick="openSurah(${s.id}, '${s.name.replace(/'/g, "\\'")}')" class="bg-white border border-slate-100 p-6 rounded-[2rem] cursor-pointer flex justify-between items-center shadow-sm hover:border-emerald-500 transition-all">
          <div class="flex items-center gap-5">
            <div class="surah-no"><span>${s.id}</span></div>
            <div>
              <h4 class="font-bold text-lg text-slate-800">${s.name}</h4>
              <p class="text-[10px] text-slate-400 font-bold uppercase">${s.type} • ${s.count} AYAT</p>
            </div>
          </div>
          <div class="font-quran text-2xl text-emerald-800 opacity-80">${s.nameAr}</div>
        </div>`).join('');
    }

    function renderSidebar(data) {
      document.getElementById('sidebarList').innerHTML = data.map(s => `
        <div onclick="openSurah(${s.id}, '${s.name.replace(/'/g, "\\'")}')" id="side-${s.id}" class="p-3 px-4 rounded-xl cursor-pointer text-sm hover:bg-emerald-50 text-slate-500 flex justify-between items-center group transition-all">
          <span class="font-medium">${s.id}. ${s.name}</span>
          <span class="font-quran text-lg opacity-30">${s.nameAr}</span>
        </div>`).join('');
    }

    async function openSurah(id, name) {
      currentSurahId = id;
      const s = allSurahs.find(x => x.id == id);
      document.getElementById('homeView').classList.add('hidden');
      document.getElementById('readingView').classList.remove('hidden');
      document.getElementById('activeTitle').innerText = name;
      document.getElementById('headerTitle').innerText = name;
      document.getElementById('surahMeta').innerText = `${s.type} • ${s.count} AYAT`;
      document.getElementById('mainAudio').src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${id}.mp3`;
      document.getElementById('bismillahArea').classList.toggle('hidden', id == 1 || id == 9);
      
      document.querySelectorAll('#sidebarList div').forEach(el => el.classList.remove('sidebar-active'));
      if(document.getElementById(`side-${id}`)) document.getElementById(`side-${id}`).classList.add('sidebar-active');
      if (window.innerWidth < 1024) toggleSidebar();
      
      document.getElementById('ayatList').innerHTML = `<div class="text-center py-20 text-emerald-800 font-bold animate-pulse">Memuat Ayat...</div>`;
      window.scrollTo({top: 0, behavior: 'smooth'});

      const res = await fetch(`${SCRIPT_URL}?action=getAyatData&surahId=${id}`);
      const ayats = await res.json();
      
      document.getElementById('ayatList').innerHTML = ayats.map(a => `
        <div class="space-y-10 border-b border-slate-50 pb-20 px-4">
          <div class="flex justify-between items-center">
            <div class="quran-no">${a.no}</div>
            <button onclick="new Audio('${a.audio}').play()" class="text-emerald-600 text-xl">🔊</button>
          </div>
          <div class="font-quran text-right text-slate-800 leading-[3]">${a.arab}</div>
          <div class="space-y-4">
            <p class="text-slate-500 text-lg leading-relaxed font-light pl-6 border-l-2 border-emerald-500">${a.indo}</p>
            <details class="bg-amber-50/30 p-4 rounded-2xl border border-amber-100">
              <summary class="list-none cursor-pointer font-bold text-amber-800 text-[10px] tracking-widest uppercase">Tafsir Jalalain</summary>
              <p class="mt-3 text-sm text-amber-900 leading-relaxed italic">${a.tafsir}</p>
            </details>
          </div>
        </div>`).join('');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    function showHome() {
      document.getElementById('homeView').classList.remove('hidden');
      document.getElementById('readingView').classList.add('hidden');
      document.getElementById('headerTitle').innerText = "Indeks Surah";
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function navSurah(step) {
      const nextId = currentSurahId + step;
      if (nextId >= 1 && nextId <= 114) {
        const s = allSurahs.find(x => x.id == nextId);
        if(s) openSurah(s.id, s.name);
      }
    }

    function filterSurah() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderGrid(allSurahs.filter(s => s.name.toLowerCase().includes(q)));
    }

    function adjustFont(delta) {
      const root = document.documentElement;
      const current = parseFloat(getComputedStyle(root).getPropertyValue('--arabic-size'));
      root.style.setProperty('--arabic-size', Math.min(Math.max(current + delta, 1.5), 5) + 'rem');
    }
  </script>
</body>
</html>
