<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Qur'an Digital 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    .font-quran { font-family: 'Amiri', serif; line-height: 2.8; direction: rtl; }
    .card-surah:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <header class="sticky top-0 z-50 bg-emerald-800 text-white shadow-md p-4 px-6 flex justify-between items-center">
    <h1 onclick="location.reload()" class="text-xl font-bold cursor-pointer">📖 Quran Pro 2026</h1>
    <div id="btnBack" class="hidden">
      <button onclick="showHome()" class="bg-emerald-700 px-4 py-2 rounded-lg text-sm">← Kembali</button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-4 py-8">
    <div id="homeView">
      <div id="loader" class="text-center py-20 text-emerald-800 font-bold animate-pulse">Menghubungkan ke API...</div>
      <div id="surahGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <div id="readingView" class="hidden space-y-8">
      <div class="text-center py-10 bg-white rounded-3xl shadow-sm border mb-8">
        <h2 id="activeTitle" class="text-3xl font-bold text-emerald-900"></h2>
        <audio id="mainAudio" controls class="mt-6 mx-auto w-full max-w-md"></audio>
      </div>
      <div id="ayatContainer" class="space-y-6"></div>
    </div>
  </main>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzF4D5BMbi4uZ5apcqhiNqqng0bB9tCStboRVknWglnU0AfBzjAs7tYraQ7rAKjBAay/exec";

    // 1. Ambil Daftar Surah
    fetch(`${API_URL}?action=getSurahList`)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loader').classList.add('hidden');
        renderGrid(data);
      });

    function renderGrid(list) {
      const grid = document.getElementById('surahGrid');
      grid.innerHTML = list.map(s => `
        <div onclick="openSurah(${s.id}, '${s.name}')" class="card-surah bg-white p-5 rounded-2xl border border-gray-100 cursor-pointer transition-all">
          <div class="text-emerald-600 font-bold text-xs mb-1">SURAH ${s.id}</div>
          <div class="text-lg font-bold text-slate-800">${s.name}</div>
        </div>
      `).join('');
    }

    function openSurah(id, name) {
      document.getElementById('homeView').classList.add('hidden');
      document.getElementById('readingView').classList.remove('hidden');
      document.getElementById('btnBack').classList.remove('hidden');
      document.getElementById('activeTitle').innerText = name;
      document.getElementById('mainAudio').src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${id}.mp3`;
      document.getElementById('ayatContainer').innerHTML = '<p class="text-center py-10 animate-pulse text-emerald-600 font-bold">Memuat Ayat...</p>';

      fetch(`${API_URL}?action=getAyatData&surahId=${id}`)
        .then(res => res.json())
        .then(ayats => {
          document.getElementById('ayatContainer').innerHTML = ayats.map(a => `
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-50">
              <div class="flex justify-between items-center mb-6">
                <span class="w-8 h-8 flex items-center justify-center bg-emerald-800 text-white rounded-full text-xs font-bold">${a.no}</span>
                <button onclick="new Audio('${a.audio}').play()" class="text-emerald-600 text-xs font-bold">🔊 PUTAR AYAT</button>
              </div>
              <div class="font-quran text-4xl text-right mb-6">${a.arab}</div>
              <p class="text-gray-700 text-lg mb-4 border-l-4 border-emerald-500 pl-4">${a.indo}</p>
              <div class="bg-amber-50 p-4 rounded-xl text-sm text-amber-900 italic border border-amber-100">
                <span class="font-bold block mb-1 text-[10px] text-amber-700 uppercase tracking-widest">Tafsir Jalalain</span>
                ${a.tafsir}
              </div>
            </div>
          `).join('');
          window.scrollTo(0,0);
        });
    }

    function showHome() {
      document.getElementById('homeView').classList.remove('hidden');
      document.getElementById('readingView').classList.add('hidden');
      document.getElementById('btnBack').classList.add('hidden');
      document.getElementById('mainAudio').pause();
    }
  </script>
</body>
  </html>
