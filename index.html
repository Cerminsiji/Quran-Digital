<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Al-Qur'an Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --arabic-size: 2.8rem; }
    body { font-family: 'Inter', sans-serif; background: #fafafa; scroll-behavior: smooth; overflow-x: hidden; }
    
    /* Tipografi Mushaf Pro */
    .font-quran { font-family: 'Amiri', serif; line-height: 2.8; direction: rtl; font-size: var(--arabic-size); }
    .font-surah-ar { font-family: 'Amiri', serif; font-size: 1.8rem; color: #065f46; font-weight: 700; }
    
    /* UI Components */
    .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #f1f5f9; }
    .sidebar-active { background: #f0fdf4 !important; border-right: 4px solid #059669; color: #065f46 !important; font-weight: 700; }
    .card-hover:hover { transform: translateY(-3px); border-color: #10b981; box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.1); }
    
    /* Utilities */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Layout Logic */
    @media (min-width: 1024px) { 
      .main-content { margin-left: 20rem; } 
      .sidebar-fixed { transform: translateX(0) !important; } 
    }
  </style>
</head>
<body class="text-slate-900">

  <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-white z-[60] border-r border-slate-100 flex flex-col -translate-x-full sidebar-fixed transition-transform duration-300">
    <div class="p-8 border-b border-slate-50 bg-white">
      <div onclick="showHome()" class="flex items-center gap-3 mb-6 cursor-pointer group">
        <div class="bg-emerald-800 text-white p-2 rounded-xl shadow-lg shadow-emerald-200 group-hover:bg-emerald-700 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        </div>
        <div>
          <h1 class="font-bold text-emerald-900">Al-Quran</h1>
          <p class="text-[10px] text-emerald-600 font-bold tracking-widest uppercase">Digital</p>
        </div>
      </div>
      <input type="text" id="searchInput" onkeyup="filterSurah()" placeholder="Cari Surah..." class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500/20 text-sm transition-all">
    </div>
    <nav id="sidebarList" class="overflow-y-auto flex-1 p-4 space-y-1 hide-scrollbar">
      </nav>
  </aside>

  <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[55] lg:hidden hidden"></div>

  <header class="glass-nav sticky top-0 z-50 p-4 main-content transition-all duration-300">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
      
      <div id="navControls" class="flex items-center gap-2 flex-1 justify-center lg:justify-start">
        <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200">
          <button onclick="navSurah(-1)" class="p-2 hover:bg-white rounded-lg transition text-emerald-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
          </button>
          <span id="headerTitle" class="text-[11px] font-extrabold text-slate-700 uppercase tracking-widest px-4 min-w-[120px] text-center">Indeks Surah</span>
          <button onclick="navSurah(1)" class="p-2 hover:bg-white rounded-lg transition text-emerald-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="flex items-center bg-emerald-50 rounded-full p-1 border border-emerald-100 shadow-sm">
          <button onclick="adjustFont(-0.2)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full text-xs font-bold text-emerald-800 transition">A-</button>
          <button onclick="adjustFont(0.2)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full text-xs font-bold text-emerald-800 transition">A+</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content p-6 md:p-12 transition-all duration-300">
    
    <div id="homeView" class="max-w-4xl mx-auto">
      <div class="mb-12">
        <h2 class="text-4xl font-bold text-slate-800 tracking-tight">Mushaf Indonesia</h2>
        <p class="text-slate-400 mt-2 font-medium italic">"Maka bacalah apa yang mudah bagimu dari Al-Qur'an"</p>
      </div>
      <div id="loader" class="text-center py-20 animate-pulse text-emerald-800 font-bold">Mempersiapkan Lembaran...</div>
      <div id="surahGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <div id="readingView" class="hidden max-w-4xl mx-auto">
      <div class="text-center mb-20 space-y-8">
        <div id="surahMeta" class="text-[11px] font-bold text-emerald-600 uppercase tracking-[0.3em]"></div>
        <h2 id="activeTitle" class="text-6xl font-bold text-emerald-900 italic tracking-tighter"></h2>
        <div class="flex justify-center">
          <div class="bg-white p-2 rounded-3xl shadow-xl border border-slate-50 inline-flex items-center">
            <audio id="mainAudio" controls class="h-10 w-64 md:w-80"></audio>
          </div>
        </div>
        <div id="bismillah" class="font-quran text-slate-300 text-4xl mt-12 py-10 opacity-60">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
      </div>
      <div id="ayatList" class="space-y-24 pb-40"></div>
    </div>
  </main>

  <script>
    const isAppsScript = (typeof google !== 'undefined' && google.script && google.script.run);
    const SCRIPT_URL_EXTERNAL = "URl_DEPLOY_ANDA_DISINI"; 
    
    let allSurahs = [];
    let currentSurahId = null;
    let currentFontSize = 2.8;
    let surahMetaMap = {};

    window.onload = () => initApp();

    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('overlay');
      sb.classList.toggle('-translate-x-full');
      ov.classList.toggle('hidden');
    }

    function adjustFont(delta) {
      currentFontSize = Math.min(Math.max(currentFontSize + delta, 1.8), 5.5);
      document.documentElement.style.setProperty('--arabic-size', `${currentFontSize}rem`);
    }

    async function initApp() {
      try {
        // Ambil Metadata Eksternal (Nama Arab, Tipe Surah, Jumlah Ayat)
        const metaRes = await fetch("https://api.alquran.cloud/v1/surah");
        const metaData = await metaRes.json();
        metaData.data.forEach(s => {
          surahMetaMap[s.number] = { 
            type: s.revelationType === "Meccan" ? "Makkiyah" : "Madaniyah", 
            count: s.numberOfAyahs,
            nameAr: s.name
          };
        });

        const handler = (data) => {
          if(!data || data.length === 0) return;
          allSurahs = data;
          document.getElementById('loader').classList.add('hidden');
          renderGrid(data);
          renderSidebar(data);
        };

        if (isAppsScript) {
          google.script.run.withSuccessHandler(handler).fetchSurahList();
        } else {
          fetch(`${SCRIPT_URL_EXTERNAL}?action=getSurahList`).then(r => r.json()).then(handler);
        }
      } catch(e) { 
        console.error("Gagal inisialisasi:", e);
        document.getElementById('loader').innerText = "Gagal memuat data. Periksa koneksi.";
      }
    }

    function renderGrid(data) {
      document.getElementById('surahGrid').innerHTML = data.map(s => {
        const meta = surahMetaMap[s.id] || { type: "-", count: 0, nameAr: "" };
        return `
        <div onclick="openSurah(${s.id}, '${s.name.replace(/'/g, "\\'")}')" class="card-hover bg-white border border-slate-100 p-8 rounded-[2.5rem] cursor-pointer flex justify-between items-center transition-all shadow-sm">
          <div class="space-y-2">
            <h4 class="font-bold text-xl text-slate-800">${s.name}</h4>
            <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest">${meta.type} • ${meta.count} Ayat</p>
          </div>
          <div class="font-surah-ar text-emerald-800 opacity-80">${meta.nameAr}</div>
        </div>`;
      }).join('');
    }

    function renderSidebar(data) {
      document.getElementById('sidebarList').innerHTML = data.map(s => `
        <div onclick="openSurah(${s.id}, '${s.name.replace(/'/g, "\\'")}', true)" id="side-${s.id}" class="p-3 px-4 rounded-xl cursor-pointer text-sm hover:bg-emerald-50 text-slate-500 transition-all flex justify-between items-center group">
          <span class="font-medium group-hover:text-emerald-700">${s.name}</span>
          <span class="font-quran text-lg opacity-30">${surahMetaMap[s.id]?.nameAr || ''}</span>
        </div>
      `).join('');
    }

    /**
     * @param {number} id - ID Surah
     * @param {string} name - Nama Surah
     * @param {boolean} fromSidebar - Apakah diklik dari sidebar
     */
    function openSurah(id, name, fromSidebar = false) {
      currentSurahId = id;
      const meta = surahMetaMap[id] || { type: "", count: "" };
      
      document.getElementById('homeView').classList.add('hidden');
      document.getElementById('readingView').classList.remove('hidden');
      document.getElementById('activeTitle').innerText = name;
      document.getElementById('headerTitle').innerText = name;
      document.getElementById('surahMeta').innerText = `${meta.type} • ${meta.count} Ayat`;
      document.getElementById('mainAudio').src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${id}.mp3`;
      document.getElementById('bismillah').classList.toggle('hidden', id == 1 || id == 9);
      
      // Update Highlight Sidebar
      document.querySelectorAll('#sidebarList div').forEach(el => el.classList.remove('sidebar-active'));
      const activeSide = document.getElementById(`side-${id}`);
      if(activeSide) activeSide.classList.add('sidebar-active');

      // Logika Sidebar: Hanya tutup di mobile jika diklik dari Sidebar atau jika grid dipilih
      if (window.innerWidth < 1024) {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        sb.classList.add('-translate-x-full');
        ov.classList.add('hidden');
      }

      document.getElementById('ayatList').innerHTML = `<div class="text-center py-20 text-emerald-800 font-bold animate-pulse">Memuat Kalamullah...</div>`;
      window.scrollTo({top: 0, behavior: 'smooth'});

      const handler = (ayats) => {
        document.getElementById('ayatList').innerHTML = ayats.map(a => `
          <div class="group space-y-10 border-b border-slate-50 pb-20 px-2">
            <div class="flex justify-between items-center">
              <div class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-400 shadow-sm">${a.no}</div>
              <button onclick="new Audio('${a.audio}').play()" class="text-emerald-600 hover:scale-125 transition-transform text-xl">🔊</button>
            </div>
            <div class="font-quran text-right text-slate-800">${a.arab}</div>
            <div class="space-y-6">
              <p class="text-slate-500 text-lg leading-relaxed font-light pl-6 border-l-2 border-emerald-500">${a.indo}</p>
              <details class="bg-amber-50/40 p-5 rounded-2xl border border-amber-100 group/tafsir">
                <summary class="list-none flex justify-between cursor-pointer font-bold text-amber-800 uppercase text-[10px] tracking-widest">Tafsir Jalalain <span>▼</span></summary>
                <p class="mt-4 text-sm text-amber-900 leading-relaxed italic border-t border-amber-200/50 pt-4">${a.tafsir}</p>
              </details>
            </div>
          </div>`).join('');
      };

      if (isAppsScript) {
        google.script.run.withSuccessHandler(handler).fetchAyatData(id);
      } else {
        fetch(`${SCRIPT_URL_EXTERNAL}?action=getAyatData&surahId=${id}`).then(r => r.json()).then(handler);
      }
    }

    function navSurah(step) {
      const nextId = currentSurahId + step;
      if (nextId >= 1 && nextId <= 114) {
        const nextS = allSurahs.find(s => s.id == nextId);
        if(nextS) openSurah(nextId, nextS.name);
      }
    }

    function showHome() {
      document.getElementById('homeView').classList.remove('hidden');
      document.getElementById('readingView').classList.add('hidden');
      document.getElementById('headerTitle').innerText = "Indeks Surah";
      document.getElementById('mainAudio').pause();
      window.scrollTo({top: 0, behavior: 'smooth'});
      
      // Jika di mobile, tutup sidebar saat kembali ke home
      if (window.innerWidth < 1024) {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('overlay').classList.add('hidden');
      }
    }

    function filterSurah() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderGrid(allSurahs.filter(s => s.name.toLowerCase().includes(q)));
    }
  </script>
</body>
</html>
