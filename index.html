<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushaf Digital Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --ar-size: 2.5rem; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #1e293b; }
        .font-quran { font-family: 'Amiri', serif; line-height: 3; direction: rtl; font-size: var(--ar-size); }
        .surah-card { border: 1px solid #f1f5f9; transition: all 0.2s; cursor: pointer; border-radius: 1rem; }
        .surah-card:hover { border-color: #3b82f6; background: #eff6ff; transform: translateY(-2px); }
        .nav-active { background: #eff6ff; color: #2563eb !important; font-weight: 700; }
    </style>
</head>
<body class="bg-slate-50/30">
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-72 bg-white border-r z-50 -translate-x-full lg:translate-x-0 transition-transform flex flex-col">
        <div class="p-6 border-b">
            <h1 class="font-bold text-xl text-blue-600">Mushaf Pro</h1>
            <input type="text" id="search" onkeyup="filter()" placeholder="Cari surah..." class="w-full mt-4 p-2 bg-slate-100 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500/20">
        </div>
        <nav id="sideList" class="flex-1 overflow-y-auto p-4 space-y-1"></nav>
    </aside>

    <main class="lg:ml-72 min-h-screen">
        <header class="sticky top-0 bg-white/80 backdrop-blur-md border-b z-40 p-4 px-6 flex justify-between items-center">
            <button onclick="toggleSide()" class="lg:hidden p-2">☰</button>
            <div id="topInfo" class="text-center lg:text-left"><span id="title" class="font-bold">Daftar Surah</span></div>
            <div class="flex gap-2">
                <button onclick="zoom(-0.1)" class="p-2 bg-slate-100 rounded-lg text-xs font-bold">A-</button>
                <button onclick="zoom(0.1)" class="p-2 bg-slate-100 rounded-lg text-xs font-bold">A+</button>
            </div>
        </header>

        <div id="content" class="p-6 max-w-4xl mx-auto">
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <div id="reader" class="hidden">
                <div class="text-center mb-10">
                    <h2 id="rName" class="text-4xl font-bold"></h2>
                    <audio id="player" controls class="mx-auto mt-6 w-full max-w-xs"></audio>
                </div>
                <div id="ayahs"></div>
            </div>
        </div>
    </main>

    <script>
      //Masukkan Url Apps Script
        const API = "https://script.google.com/macros/s/AKfycbyO5iRRs8v8s5KN_Q1y-7iPQgibRWF50CUvzLYIrp_zr23p1IOzU8JY17oBBZkJHus1/exec";
        let data = [];

        async function init() {
            const res = await fetch(`${API}?action=getSurahList`);
            data = await res.json();
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const side = document.getElementById('sideList');
            grid.innerHTML = data.map(s => `
                <div onclick="read(${s.id},'${s.name}')" class="surah-card p-4 flex items-center gap-4 bg-white">
                    <div class="w-10 h-10 bg-blue-600 text-white flex items-center justify-center rounded-lg font-bold">${s.id}</div>
                    <div class="flex-1">
                        <div class="font-bold text-sm">${s.name}</div>
                        <div class="text-[10px] text-slate-400 uppercase font-bold">${s.type} • ${s.count} AYAT</div>
                    </div>
                    <div class="font-quran text-xl opacity-20">${s.nameAr}</div>
                </div>`).join('');
            side.innerHTML = data.map(s => `<div onclick="read(${s.id},'${s.name}')" class="p-2 text-sm cursor-pointer hover:text-blue-600">${s.id}. ${s.name}</div>`).join('');
        }

        async function read(id, name) {
            document.getElementById('grid').classList.add('hidden');
            document.getElementById('reader').classList.remove('hidden');
            document.getElementById('title').innerText = name;
            document.getElementById('rName').innerText = name;
            const res = await fetch(`${API}?action=getAyatData&surahId=${id}`);
            const ayats = await res.json();
            document.getElementById('ayahs').innerHTML = ayats.map(a => `
                <div class="py-8 border-b">
                    <div class="flex justify-between mb-4">
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">${id}:${a.no}</span>
                        <button onclick="new Audio('${a.audio}').play()" class="text-slate-300 hover:text-blue-600">▶ Putar</button>
                    </div>
                    <div class="font-quran text-right mb-6">${a.arab}</div>
                    <p class="text-slate-600 leading-relaxed">${a.indo}</p>
                    <details class="mt-4 text-xs text-slate-400"><summary class="cursor-pointer">Tafsir</summary><p class="mt-2 italic">${a.tafsir}</p></details>
                </div>`).join('');
        }

        function toggleSide() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function zoom(v) { document.documentElement.style.setProperty('--ar-size', (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--ar-size')) + v) + 'rem'); }
        window.onload = init;
    </script>
</body>
</html>
