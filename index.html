<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mushaf Al-Quran Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --arabic-size: 2.8rem; }
    body { font-family: 'Inter', sans-serif; background: #fafafa; overflow-x: hidden; scroll-behavior: smooth; }
    
    /* Tipografi Mushaf Pro */
    .font-quran { font-family: 'Amiri', serif; line-height: 2.8; direction: rtl; font-size: var(--arabic-size); }
    .font-bismillah { font-family: 'Amiri', serif; font-size: 2.5rem; color: #064e3b; }
    .font-surah-ar { font-family: 'Amiri', serif; font-size: 1.8rem; color: #065f46; font-weight: 700; }
    
    /* Ornamen Logo Angka Islami (Rub el Hizb) */
    .quran-no {
      display: inline-flex; align-items: center; justify-content: center;
      width: 45px; height: 45px; background: #10b981; color: white;
      font-weight: bold; font-size: 14px; position: relative;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }
    .surah-no {
      width: 50px; height: 50px; background: #064e3b;
      display: flex; align-items: center; justify-content: center;
      color: white; border-radius: 12px; transform: rotate(45deg);
    }
    .surah-no span { transform: rotate(-45deg); font-weight: 800; }

    /* UI Components */
    .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #f1f5f9; }
    .sidebar-active { background: #f0fdf4 !important; border-right: 4px solid #059669; color: #065f46 !important; font-weight: 700; }
    .card-hover:hover { transform: translateY(-3px); border-color: #10b981; box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.1); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* Layout Desktop & Mobile */
    @media (min-width: 1024px) { 
      .main-content { margin-left: 20rem; } 
      .sidebar-fixed { transform: translateX(0) !important; } 
    }
  </style>
</head>
<body class="text-slate-900">

  <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-white z-[60] border-r border-slate-100 flex flex-col -translate-x-full sidebar-fixed transition-transform duration-300">
    <div class="p-8 border-b border-slate-50 bg-white">
      <div onclick="showHome()" class="flex items-center gap-3 mb-6 cursor-pointer group">
        <div class="bg-emerald-800 text-white p-2 rounded-xl shadow-lg shadow-emerald-200 group-hover:bg-emerald-700 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        </div>
        <div>
          <h1 class="font-bold text-emerald-900 text-xl tracking-tight">Mushaf Al-Quran Digital</h1>
          <p class="text-[10px] text-emerald-600 font-bold tracking-widest uppercase">2026</p>
        </div>
      </div>
      <input type="text" id="searchInput" onkeyup="filterSurah()" placeholder="Cari Surah..." class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500/20 text-sm transition-all shadow-inner">
    </div>
    <nav id="sidebarList" class="overflow-y-auto flex-1 p-4 space-y-1 hide-scrollbar bg-white">
      </nav>
  </aside>

  <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[55] lg:hidden hidden transition-opacity duration-300"></div>

  <header class="glass-nav sticky top-0 z-50 p-4 main-content transition-all duration-300">
    <div class="max-w-4xl mx-auto flex justify-between items-center px-2">
      <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
      
      <div id="navControls" class="flex items-center gap-2 flex-1 justify-center lg:justify-start">
        <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200">
          <button onclick="navSurah(-1)" class="p-2 hover:bg-white rounded-lg transition text-emerald-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
          </button>
          <span id="headerTitle" class="text-[11px] font-extrabold text-slate-700 uppercase tracking-widest px-4 min-w-[120px] text-center">Pilih Surah</span>
          <button onclick="navSurah(1)" class="p-2 hover:bg-white rounded-lg transition text-emerald-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="flex items-center bg-emerald-50 rounded-full p-1 border border-emerald-100 shadow-sm">
          <button onclick="adjustFont(-0.2)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full text-xs font-bold text-emerald-800 transition">A-</button>
          <button onclick="adjustFont(0.2)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full text-xs font-bold text-emerald-800 transition">A+</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content p-6 md:p-12 transition-all duration-300 min-h-screen">
    
    <div id="homeView" class="max-w-4xl mx-auto">
      <div class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
          <h2 class="text-4xl font-bold text-slate-800 tracking-tight">Kalamullah</h2>
          <p class="text-slate-400 mt-2 font-medium italic">"Maka bacalah apa yang mudah bagimu dari Al-Qur'an"</p>
        </div>
        <div class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-4 py-2 rounded-full uppercase tracking-widest border border-emerald-100 shadow-inner">
           Total 114 Surah
        </div>
      </div>
      
      <div id="loader" class="text-center py-20 animate-pulse text-emerald-800 font-bold">Mempersiapkan Lembaran Suci...</div>
      
      <div id="surahGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <div id="readingView" class="hidden max-w-5xl mx-auto">
      <div class="text-center mb-20 space-y-8 bg-white p-10 rounded-[2rem] border border-slate-50 shadow-sm">
        <div id="surahMeta" class="text-[11px] font-bold text-emerald-600 uppercase tracking-[0.3em] bg-emerald-50 px-4 py-1 inline-block rounded-full border border-emerald-100 shadow-inner"></div>
        <h2 id="activeTitle" class="text-6xl font-bold text-emerald-900 italic tracking-tighter"></h2>
        
        <div class="flex justify-center">
          <div class="bg-white p-2 rounded-3xl shadow-xl border border-slate-50 inline-flex items-center gap-4">
            <audio id="mainAudio" controls class="h-10 w-64 md:w-96"></audio>
          </div>
        </div>
        
      <div id="ayatList" class="space-y-24 pb-40"></div>
    </div>
  </main>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyO5iRRs8v8s5KN_Q1y-7iPQgibRWF50CUvzLYIrp_zr23p1IOzU8JY17oBBZkJHus1/exec";
    
    let allSurahs = [];
    let currentSurahId = null;
    let currentFontSize = 2.8;
    let surahMetaMap = {}; // Local map untuk metadata surah

    window.onload = () => initApp();

    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('overlay');
      sb.classList.toggle('-translate-x-full');
      ov.classList.toggle('hidden');
    }

    function adjustFont(delta) {
      currentFontSize = Math.min(Math.max(currentFontSize + delta, 1.8), 5.5);
      document.documentElement.style.setProperty('--arabic-size', `${currentFontSize}rem`);
    }

    async function initApp() {
      try {
        // Ambil Daftar Surah Langsung dari Database Anda di Google Sheet
        const response = await fetch(`${SCRIPT_URL}?action=getSurahList`);
        const data = await response.json();
        
        if(!data || data.length === 0) {
          document.getElementById('loader').innerHTML = `<p class="text-red-500 font-bold">Database Kosong. Silakan jalankan 'syncFullData' di Code.gs Anda.</p>`;
          return;
        }

        allSurahs = data;
        
        // Simpan metadata ke map lokal untuk referensi cepat saat buka surah
        data.forEach(s => {
          surahMetaMap[s.id] = { type: s.type, count: s.count, nameAr: s.nameAr };
        });

        document.getElementById('loader').classList.add('hidden');
        renderGrid(data);
        renderSidebar(data);
      } catch(e) { 
        console.error("Gagal inisialisasi:", e);
        document.getElementById('loader').innerHTML = `<p class="text-red-500 font-bold">Gagal terhubung ke Database Apps Script. Periksa URL Deployment Anda.</p>`;
      }
    }

    function renderGrid(data) {
      document.getElementById('surahGrid').innerHTML = data.map(s => `
        <div onclick="openSurah(${s.id}, '${s.name.replace(/'/g, "\\'")}')" class="card-hover bg-white border border-slate-100 p-8 rounded-[2.5rem] cursor-pointer flex justify-between items-center transition-all shadow-sm">
          <div class="flex items-center gap-6">
            <div class="surah-no"><span>${s.id}</span></div>
            <div class="space-y-2">
              <h4 class="font-bold text-2xl text-slate-800 tracking-tight">${s.name}</h4>
              <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest bg-slate-50 px-3 py-1 inline-block rounded-full border border-slate-100 shadow-inner">${s.type} • ${s.count} Ayat</p>
            </div>
          </div>
          <div class="font-surah-ar text-emerald-800 opacity-80 text-3xl tracking-tight">${s.nameAr}</div>
        </div>`).join('');
    }

    function renderSidebar(data) {
      document.getElementById('sidebarList').innerHTML = data.map(s => `
        <div onclick="openSurah(${s.id}, '${s.name.replace(/'/g, "\\'")}')" id="side-${s.id}" class="p-3 px-4 rounded-xl cursor-pointer text-sm hover:bg-emerald-50 text-slate-500 transition-all flex justify-between items-center group shadow-inner">
          <span class="font-medium group-hover:text-emerald-700">${s.id}. ${s.name}</span>
          <span class="font-quran text-lg opacity-30">${s.nameAr}</span>
        </div>`).join('');
    }

    async function openSurah(id, name) {
      currentSurahId = id;
      const meta = surahMetaMap[id] || { type: "Loading", count: "..." };
      
      document.getElementById('homeView').classList.add('hidden');
      document.getElementById('readingView').classList.remove('hidden');
      document.getElementById('activeTitle').innerText = name;
      document.getElementById('headerTitle').innerText = name;
      document.getElementById('surahMeta').innerText = `${meta.type} • ${meta.count} Ayat`;
      document.getElementById('mainAudio').src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${id}.mp3`;
      
      // Update Highlight Sidebar
      document.querySelectorAll('#sidebarList div').forEach(el => el.classList.remove('sidebar-active'));
      const activeSide = document.getElementById(`side-${id}`);
      if(activeSide) activeSide.classList.add('sidebar-active');

      // Logika Tutup Sidebar Cerdas di Mobile
      if (window.innerWidth < 1024) {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('overlay').classList.add('hidden');
      }

      document.getElementById('ayatList').innerHTML = `<div class="text-center py-20 text-emerald-800 font-bold animate-pulse">Menyiapkan Mushaf...</div>`;
      window.scrollTo({top: 0, behavior: 'smooth'});

      try {
        // Ambil Data Ayat dari Database Anda (CORS Aman)
        const res = await fetch(`${SCRIPT_URL}?action=getAyatData&surahId=${id}`);
        const ayats = await res.json();
        
        document.getElementById('ayatList').innerHTML = ayats.map(a => `
          <div class="group space-y-10 border-b border-slate-50 pb-20 px-4 bg-white p-10 rounded-[2rem] border border-slate-100 shadow-sm transition-all hover:bg-emerald-50/20">
            <div class="flex justify-between items-center">
              <div class="quran-no">${a.no}</div>
              <button onclick="new Audio('${a.audio}').play()" class="text-emerald-600 hover:scale-125 transition-transform text-xl shadow-inner bg-white p-2 rounded-full border border-slate-100">🔊</button>
            </div>
            <div class="font-quran text-right text-slate-800 leading-[3] tracking-wide">${a.arab}</div>
            <div class="space-y-6">
              <p class="text-slate-500 text-lg leading-relaxed font-light pl-6 border-l-2 border-emerald-500 italic bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-inner">${a.indo}</p>
              <details class="bg-amber-50/40 p-5 rounded-2xl border border-amber-100 group/tafsir shadow-inner transition-all hover:bg-amber-100/50">
                <summary class="list-none flex justify-between cursor-pointer font-bold text-amber-800 uppercase text-[10px] tracking-widest transition-all hover:tracking-[0.2em]">Tafsir Jalalain <span>▼</span></summary>
                <p class="mt-4 text-sm text-amber-900 leading-relaxed italic border-t border-amber-200/50 pt-4 bg-white/50 p-4 rounded-xl border border-amber-100">${a.tafsir}</p>
              </details>
            </div>
          </div>`).join('');
      } catch (err) {
        document.getElementById('ayatList').innerHTML = `<p class="text-red-500 text-center font-bold">Gagal memuat ayat. Periksa koneksi atau deployment Apps Script.</p>`;
      }
    }

    function navSurah(step) {
      const nextId = currentSurahId + step;
      if (nextId >= 1 && nextId <= 114) {
        const nextS = allSurahs.find(s => s.id == nextId);
        if(nextS) openSurah(nextId, nextS.name);
      }
    }

    function showHome() {
      document.getElementById('homeView').classList.remove('hidden');
      document.getElementById('readingView').classList.add('hidden');
      document.getElementById('headerTitle').innerText = "Indeks Surah";
      document.getElementById('mainAudio').pause();
      window.scrollTo({top: 0, behavior: 'smooth'});
      
      // Jika di mobile, tutup sidebar saat kembali ke home
      if (window.innerWidth < 1024) {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('overlay').classList.add('hidden');
      }
    }

    function filterSurah() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderGrid(allSurahs.filter(s => s.name.toLowerCase().includes(q)));
    }
  </script>
</body>
</html>
