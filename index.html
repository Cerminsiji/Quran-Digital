<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Al-Quran Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --ar-size: 2.8rem; --emerald: #10b981; }
    body { font-family: 'Inter', sans-serif; background: #fafafa; color: #1e293b; scroll-behavior: smooth; }
    .font-quran { font-family: 'Amiri', serif; line-height: 2.8; direction: rtl; font-size: var(--ar-size); }
    .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid #f1f5f9; }
    .sidebar-active { background: #f0fdf4 !important; border-right: 4px solid #059669; color: #065f46 !important; font-weight: 700; }
    .quran-no {
      display: inline-flex; align-items: center; justify-content: center; width: 45px; height: 45px; 
      background: var(--emerald); color: white; font-weight: bold; font-size: 14px;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f1f5f9; z-index: 40; display: flex; justify-content: space-between; padding: 0.8rem 1.5rem; }
    @media (min-width: 1024px) { .main-content { margin-left: 20rem; } .sidebar-fixed { transform: translateX(0) !important; } .bottom-nav { left: 20rem; } }
  </style>
</head>
<body>

  <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-white z-[60] border-r border-slate-100 flex flex-col -translate-x-full sidebar-fixed transition-transform duration-300">
    <div class="p-6 border-b border-slate-50">
      <div class="flex items-center gap-3 mb-6">
        <div class="bg-emerald-800 text-white p-2 rounded-xl">Q</div>
        <h1 class="font-bold text-emerald-900 text-lg">Al-Quran Digital Lengkap</h1>
      </div>
      <button onclick="showHome()" class="w-full flex items-center gap-3 p-3 mb-4 bg-emerald-50 text-emerald-700 rounded-xl font-bold text-sm">
        🏠 Beranda Utama
      </button>
      <input type="text" id="searchInput" onkeyup="filterSurah()" placeholder="Cari surah..." class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none text-sm">
    </div>
    <nav id="sidebarList" class="overflow-y-auto flex-1 p-4 space-y-1"></nav>
  </aside>

  <div id="overlay" onclick="toggleSidebar(true)" class="fixed inset-0 bg-slate-900/40 z-[55] lg:hidden hidden"></div>

  <header class="glass-nav sticky top-0 z-50 p-4 main-content">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-slate-50 rounded-lg">☰</button>
      <div id="headerTitle" class="text-[10px] font-extrabold text-slate-700 uppercase tracking-[0.2em]">SuksLan Media</div>
      <div class="flex items-center bg-emerald-50 rounded-full p-1">
        <button onclick="adjustFont(-0.2)" class="w-8 h-8 font-bold">-</button>
        <button onclick="adjustFont(0.2)" class="w-8 h-8 font-bold">+</button>
      </div>
    </div>
  </header>

  <main class="main-content p-4 md:p-12 transition-all min-h-screen">
    <div id="homeView" class="max-w-4xl mx-auto">
      <h2 class="text-3xl font-bold mb-8">Daftar Surah</h2>
      <div id="loader" class="text-center py-10 animate-pulse">Memuat...</div>
      <div id="surahGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <div id="readingView" class="hidden max-w-4xl mx-auto pb-32">
      <div class="text-center mb-10 bg-white p-8 rounded-[2rem] border border-slate-50 shadow-sm">
        <h2 id="activeTitle" class="text-4xl font-bold text-emerald-900"></h2>
        <audio id="mainAudio" controls class="mt-6 w-full max-w-xs mx-auto"></audio>
      </div>
      <div id="ayatList" class="space-y-6"></div>
    </div>
  </main>

  <div id="bottomNav" class="bottom-nav hidden">
    <button onclick="navSurah(-1)" class="bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl text-xs font-bold uppercase">← Sebelumnya</button>
    <button onclick="showHome()" class="p-2">🏠</button>
    <button onclick="navSurah(1)" class="bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl text-xs font-bold uppercase">Selanjutnya →</button>
  </div>

  <script>
    // OTOMATIS MENDETEKSI URL (Bisa di Apps Script & GitHub)
    const SCRIPT_URL = window.location.href.split(/[?#]/)[0];
    let allSurahs = [];
    let currentSurahId = null;
    let currentFontSize = 2.8;

    window.onload = () => init();

    async function init() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getSurahList`);
        allSurahs = await res.json();
        document.getElementById('loader').remove();
        renderGrid(allSurahs);
        renderSidebar(allSurahs);
      } catch(e) { console.error("API Error"); }
    }

    function toggleSidebar(close = false) {
      const sb = document.getElementById('sidebar'), ov = document.getElementById('overlay');
      if(close) { sb.classList.add('-translate-x-full'); ov.classList.add('hidden'); }
      else { sb.classList.toggle('-translate-x-full'); ov.classList.toggle('hidden'); }
    }

    function renderGrid(data) {
      document.getElementById('surahGrid').innerHTML = data.map(s => `
        <div onclick="openSurah(${s.id}, '${s.name}')" class="bg-white p-6 rounded-3xl cursor-pointer flex justify-between items-center border border-slate-100 hover:border-emerald-500 transition-all">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-emerald-800 text-white flex items-center justify-center rounded-xl font-bold">${s.id}</div>
            <div class="font-bold text-lg">${s.name}</div>
          </div>
          <div class="font-quran text-xl opacity-30">${s.nameAr}</div>
        </div>`).join('');
    }

    function renderSidebar(data) {
      document.getElementById('sidebarList').innerHTML = data.map(s => `<div onclick="openSurah(${s.id}, '${s.name}')" id="side-${s.id}" class="p-3 px-4 rounded-xl cursor-pointer text-sm hover:bg-emerald-50 text-slate-500 flex justify-between items-center"><span>${s.id}. ${s.name}</span> <span class="opacity-20">${s.nameAr}</span></div>`).join('');
    }

    async function openSurah(id, name) {
      currentSurahId = id;
      toggleSidebar(true);
      document.getElementById('homeView').classList.add('hidden');
      document.getElementById('readingView').classList.remove('hidden');
      document.getElementById('bottomNav').classList.remove('hidden');
      document.getElementById('activeTitle').innerText = name;
      document.getElementById('mainAudio').src = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${id}.mp3`;
      
      document.getElementById('ayatList').innerHTML = `<p class="text-center py-10 animate-pulse">Menyiapkan Ayat...</p>`;
      window.scrollTo(0,0);

      const res = await fetch(`${SCRIPT_URL}?action=getAyatData&surahId=${id}`);
      const ayats = await res.json();
      
      document.getElementById('ayatList').innerHTML = ayats.map(a => {
        let arab = a.arab, bism = "";
        if (a.no == 1 && id != 1 && id != 9 && arab.includes("بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ")) {
          arab = arab.replace("بِسْمِ اللَّهِ الرَّحْمَنِ الرَّhمَنِ الرَّحِيمِ", "").trim();
          bism = `<div class="mb-6 p-4 text-center font-quran text-2xl bg-emerald-50 rounded-2xl">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>`;
        }
        return `
          <div class="bg-white p-6 md:p-10 rounded-[2rem] border border-slate-100 space-y-6">
            ${bism}
            <div class="flex justify-between items-center"><div class="quran-no">${a.no}</div><button onclick="new Audio('${a.audio}').play()" class="text-emerald-600">🔊 Putar</button></div>
            <div class="font-quran text-right">${a.arab}</div>
            <p class="text-slate-600 leading-relaxed italic border-l-4 border-emerald-500 pl-4">${a.indo}</p>
            <details class="text-xs bg-slate-50 p-4 rounded-xl"><summary class="cursor-pointer font-bold uppercase">Tafsir Jalalain</summary><p class="mt-2 text-slate-500">${a.tafsir}</p></details>
          </div>`;
      }).join('');
    }

    function navSurah(step) {
      const nextId = currentSurahId + step;
      if (nextId >= 1 && nextId <= 114) {
        const s = allSurahs.find(x => x.id == nextId);
        openSurah(nextId, s.name);
      }
    }

    function showHome() {
      toggleSidebar(true);
      document.getElementById('homeView').classList.remove('hidden');
      document.getElementById('readingView').classList.add('hidden');
      document.getElementById('bottomNav').classList.add('hidden');
      window.scrollTo(0,0);
    }

    function adjustFont(d) {
      currentFontSize += d;
      document.documentElement.style.setProperty('--ar-size', `${currentFontSize}rem`);
    }

    function filterSurah() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderGrid(allSurahs.filter(s => s.name.toLowerCase().includes(q) || s.id.toString().includes(q)));
    }
  </script>
</body>
</html>
